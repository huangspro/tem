<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活动预览</title>

<!-- 样式 -->
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
}

/* 日历栏 */
.date-bar {
    padding: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 10;
}

/* 输入框 */
#datePicker {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* 活动列表 */
.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.12);
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.time {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 5px;
}

.intro {
    margin-top: 8px;
    font-size: 13px;
    opacity: 0.85;
}

.tag {
    display: inline-block;
    padding: 3px 8px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 12px;
    background: #6a5acd;
}
</style>
<!-- flatpickr calendar -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<!-- choose date -->
<div class="date-bar">
    <input id="datePicker" placeholder="选择日期查看活动" />
</div>

<!-- activities list -->
<div class="container" id="list"></div>

<script>
$(function () {

    let allActivities = [];

    flatpickr("#datePicker", {
        dateFormat: "Y-m-d",
        defaultDate: new Date(),
        onChange: function (selectedDates, dateStr) {
            renderByDate(dateStr);
        }
    });

    function loadAllActivities() {
        $.ajax({
            url: "/get",
            method: "POST",
            success: function (res) {
                allActivities = res || [];
                let today = formatDate(new Date());
                renderByDate(today);
            },
            error: function () {
                $("#list").html("<p>加载失败</p>");
            }
        });
    }

    function renderByDate(dateStr) {
        let filtered = allActivities.filter(item => {
            return item.start_time && item.start_time.startsWith(dateStr);
        });

        renderList(filtered);
    }

    function renderList(data) {
        const $list = $("#list");
        $list.empty();

        if (!data || data.length === 0) {
            $list.html("<p>当天暂无活动</p>");
            return;
        }

        data.forEach(item => {
            let card = $(`
                <div class="card" style="cursor:pointer;">
                    <div class="title">${item.title || ""}</div>
                    <div class="time">
                        ${item.start_time || ""} ~ ${item.end_time || ""}
                    </div>
                    <div class="intro">${item.introduction || ""}</div>
                    <div class="tag">${item.tag || "活动"}</div>
                </div>
            `);
              card.on("click", function () {
                openDetail(item);
            });

            $list.append(card);
        });
    }

    // ===== 活动详情弹窗 =====
    function openDetail(item) {
        let html = `
            <div id="modalMask" style="
                position:fixed;top:0;left:0;width:100%;height:100%;
                background:rgba(0,0,0,0.65);
                display:flex;justify-content:center;align-items:center;
                z-index:9999;">
                <div style="
                    width:92%;max-width:520px;
                    background:#1e1e2f;
                    padding:20px;
                    border-radius:16px;
                    color:white;
                    max-height:85vh;
                    overflow-y:auto;">
                    <h2>${item.title || "Untitled"}</h2>
                    <p style="opacity:0.8;">
                        ${item.start_time || "-"} ~ ${item.end_time || "-"}
                    </p>
                    <hr style="border:0;border-top:1px solid #333;margin:10px 0;">
                    <p><b>Location:</b> ${item.position || "N/A"}</p>
                    <p><b>Introduction:</b><br>${item.introduction || "N/A"}</p>
                    <p><b>Detail:</b><br>${item.detail || "N/A"}</p>
                    <hr style="border:0;border-top:1px solid #333;margin:10px 0;">
                    <p><b>Participants:</b> ${item.participant_number || "Unknown"}</p>
                    <p><b>Conditions:</b> ${item.participant_condition || "None"}</p>
                    <p><b>Reward:</b> ${item.reward || "None"}</p>
                    <hr style="border:0;border-top:1px solid #333;margin:10px 0;">
                    <p><b>Check-in location:</b> ${item.checkin_position || "Not set"}</p>
                    <p><b>Check-in time:</b> ${item.checkin_time || "Not set"}</p>
                    <p><b>Check-out location:</b> ${item.checkout_position || "Not set"}</p>
                    <p><b>Check-out time:</b> ${item.checkout_time || "Not set"}</p>
                    <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px;">
                        <button id="signupBtn" style="
                            padding:10px;
                            border:none;
                            border-radius:10px;
                            background:#6a5acd;
                            color:white;
                            cursor:pointer;">
                            Sign up
                        </button>
                        <button id="closeModal" style="
                            padding:10px;
                            border:none;
                            border-radius:10px;
                            background:#444;
                            color:white;
                            cursor:pointer;">
                            Close
                        </button>
                    </div>
                </div>
            </div>
        `;
        $("body").append(html);
        $("#signupBtn").on("click", function () {
            if (item.signup_url) {
                window.open(item.signup_url, "_blank");
            } else {
                alert("No signup link available");
            }
        });
        $("#closeModal").on("click", function () {
            $("#modalMask").remove();
        });
    }

    function renderByDate(dateStr) {
        let filtered = allActivities.filter(item => {
            return item.start_time && item.start_time.startsWith(dateStr);
        });

        renderList(filtered);
    }

    function formatDate(d) {
        let pad = n => n < 10 ? "0" + n : n;
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    loadAllActivities();
});
</script>

</body>
</html>
