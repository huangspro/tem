<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upload Event</title>

<!-- Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
}

.input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    margin-top: 6px;
}

textarea.input {
    min-height: 120px;
    resize: vertical;
}

#submitBtn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #6a5acd;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

#submitBtn:hover {
    background: #7b6cff;
}

h2 {
    margin-top: 0;
}
</style>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Create Event</h2>

        <label>Title</label>
        <input id="title" class="input" placeholder="Tech Talk 2026">

        <label>Introduction</label>
        <textarea id="introduction" class="input" placeholder="Short introduction"></textarea>

        <label>Details</label>
        <textarea id="detail" class="input" placeholder="Describe the event in detail"></textarea>

        <label>Start Time</label>
        <input id="start_time" class="input" placeholder="Select start time">

        <label>End Time</label>
        <input id="end_time" class="input" placeholder="Select end time">

        <label>Location</label>
        <input id="position" class="input" placeholder="Singapore Convention Centre">

        <label>Participant Limit</label>
        <input id="participant_number" class="input" placeholder="100">

        <label>Participant Requirements</label>
        <input id="participant_condition" class="input" placeholder="Open to all">

        <label>Reward</label>
        <input id="reward" class="input" placeholder="Certificate + Swag">

        <label>Signup URL</label>
        <input id="signup_url" class="input" placeholder="https://signup.example.com">

        <label>Check-in URL</label>
        <input id="checkin_url" class="input" placeholder="https://checkin.example.com">

        <label>Check-out URL</label>
        <input id="checkout_url" class="input" placeholder="https://checkout.example.com">

        <button id="submitBtn">Submit Event</button>
    </div>
</div>

<script>
$(function () {

    // 时间格式转换：2026-05-01 10:00:00 -> 2026-05-01-10-00-00
    function formatTime(t) {
        return t.replace(" ", "-").replace(/:/g, "-");
    }

    // 初始化时间选择器
    let endPicker;

    let startPicker = flatpickr("#start_time", {
        enableTime: true,
        dateFormat: "Y-m-d H:i:S",
        time_24hr: true,
        onChange: function(selectedDates) {
            if (endPicker) {
                endPicker.set("minDate", selectedDates[0]);
            }
        }
    });

    endPicker = flatpickr("#end_time", {
        enableTime: true,
        dateFormat: "Y-m-d H:i:S",
        time_24hr: true
    });

    $("#submitBtn").on("click", function () {

        if (!$("#title").val()) {
            alert("Please enter a title");
            return;
        }

        let data = {
            title: $("#title").val(),
            introduction: $("#introduction").val(),
            detail: $("#detail").val(),
            start_time: formatTime($("#start_time").val()),
            end_time: formatTime($("#end_time").val()),
            position: $("#position").val(),
            participant_number: $("#participant_number").val(),
            participant_condition: $("#participant_condition").val(),
            reward: $("#reward").val(),
            signup_url: $("#signup_url").val(),
            checkin_url: $("#checkin_url").val(),
            checkout_url: $("#checkout_url").val()
        };

        console.log("Submitting JSON:", data);

        $.ajax({
            url: "/new",
            method: "POST",
            contentType: "application/json",
            dataType: "json",
            data: JSON.stringify(data),

            success: function (res) {
                if (res.status === "success") {
                    alert("Upload successful!");
                } else {
                    alert("Server error");
                }
            },

            error: function (xhr) {
                console.error(xhr.responseText);
                alert("Upload failed: " + xhr.status);
            }
        });

    });

});
</script>

</body>
</html>
